<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha tarefas</title>
    <link rel="stylesheet" href="Style/style.css">
</head>
<body>
    <header>
        <h1 class="title">Minhas tarefas</h1>
    </header>
    <section class="board">
        <div class="card">
            <h2>Fazendo</h2>
            <h2>______________</h2>
            <ul id="lista-fazendo">
                <li>               
                    <input type="checkbox">
                    Layout do projeto
                </li>
            </ul>
            <input id="input-fazendo" type="text" placeholder="Adicione task"><button id="btn-fazendo">+</button> 
        </div>
        <div class="card">
            <h2>A Fazer</h2>
            <h2>______________</h2>
            <ul id="lista-afazer">
                <li>               
                    <input type="checkbox">
                    Terminar o projeto
                </li>       
            </ul>
            <input id="input-afazer" type="text" placeholder="Adicione task"><button id="btn-afazer">+</button>
        </div>
        <div class="card">
            <h2>Feito</h2>
            <h2>______________</h2>
            <ul>
                <br>
                <li>
                    Projeto terminado
                </li>
            </ul>
        </div>        
    </section>
    <script src="Script/script.js"></script>
</body>
</html>
