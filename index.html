<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha tarefas</title>
    <link rel="stylesheet" href="Style/style.css">
</head>
<body>
    <header>
        <h1 class="title">Minhas tarefas</h1>
    </header>
    <section class="board">
        <ul class="card">
            <h2>Fazendo</h2>
            <input type="text" placeholder="Adicione task"><button>+</button>
            <br>
            <li>               
                <input type="checkbox">
                Terminando projeto
            </li>
        </ul>
        <ul class="card">
            <h2>A Fazer</h2>
            <input type="text" placeholder="Adicione task"><button>+</button>
            <br> 
            <li>
                <input type="checkbox">
                Estudar
            </li>
        </ul>
        <ul class="card">
            <h2>Feito</h2>
            <input type="text" placeholder="Adicione task"><button>+</button>
            <br>
            <li>
                <input type="checkbox">
                Projeto terminado
            </li>
        </ul>
    </section>
</body>
</html>
